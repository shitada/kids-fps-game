<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64D2FF"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>
    <linearGradient id="gun-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FF3B30"/>
    </linearGradient>
    <linearGradient id="gun-tank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
    <linearGradient id="nozzle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#30D158"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle wave pattern on background -->
  <path d="M0 380 Q64 360 128 380 T256 380 T384 380 T512 380 L512 512 Q512 512 404 512 L108 512 Q0 512 0 404 Z" fill="rgba(255,255,255,0.1)"/>
  <path d="M0 410 Q64 390 128 410 T256 410 T384 410 T512 410 L512 512 Q512 512 404 512 L108 512 Q0 512 0 404 Z" fill="rgba(255,255,255,0.08)"/>

  <g filter="url(#shadow)" transform="translate(256, 260) rotate(-25) translate(-256, -260)">
    <!-- Water gun body -->
    <rect x="130" y="210" width="200" height="80" rx="16" fill="url(#gun-body)"/>
    <!-- Body highlight -->
    <rect x="140" y="218" width="180" height="20" rx="10" fill="rgba(255,255,255,0.3)"/>

    <!-- Nozzle -->
    <rect x="320" y="222" width="90" height="56" rx="12" fill="url(#nozzle)"/>
    <rect x="395" y="230" width="30" height="40" rx="8" fill="#2ABF54"/>
    <circle cx="425" cy="250" r="12" fill="#1FAA48"/>
    <circle cx="425" cy="250" r="6" fill="#0D8035"/>

    <!-- Tank on top -->
    <rect x="170" y="160" width="100" height="60" rx="20" fill="url(#gun-tank)"/>
    <rect x="180" y="168" width="80" height="14" rx="7" fill="rgba(255,255,255,0.35)"/>
    <!-- Tank cap -->
    <rect x="205" y="148" width="30" height="18" rx="6" fill="#FF9500"/>

    <!-- Handle / grip -->
    <rect x="190" y="285" width="50" height="75" rx="12" fill="url(#gun-body)"/>
    <rect x="197" y="293" width="36" height="10" rx="5" fill="rgba(255,255,255,0.25)"/>
    <!-- Trigger guard -->
    <path d="M240 290 Q270 290 270 320 Q270 340 250 340 L240 340 L240 290 Z" fill="#E8352D" fill-opacity="0.8"/>
    <!-- Trigger -->
    <rect x="248" y="300" width="12" height="28" rx="4" fill="#CC2D26"/>

    <!-- Pump slide -->
    <rect x="135" y="240" width="60" height="22" rx="6" fill="#E8352D"/>
    <rect x="140" y="245" width="50" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Water splash effects -->
  <!-- Main splash burst -->
  <g transform="translate(375, 175)">
    <circle cx="0" cy="0" r="18" fill="white" fill-opacity="0.9"/>
    <circle cx="30" cy="-15" r="12" fill="white" fill-opacity="0.8"/>
    <circle cx="-10" cy="-30" r="10" fill="white" fill-opacity="0.7"/>
    <circle cx="45" cy="5" r="8" fill="white" fill-opacity="0.7"/>
    <circle cx="20" cy="-40" r="7" fill="rgba(200,235,255,0.8)"/>
    <circle cx="55" cy="-20" r="6" fill="rgba(200,235,255,0.7)"/>
  </g>

  <!-- Water drops flying out -->
  <ellipse cx="430" cy="120" rx="8" ry="12" fill="white" fill-opacity="0.85" transform="rotate(30, 430, 120)"/>
  <ellipse cx="450" cy="155" rx="6" ry="9" fill="white" fill-opacity="0.75" transform="rotate(15, 450, 155)"/>
  <ellipse cx="410" cy="100" rx="5" ry="8" fill="rgba(200,235,255,0.8)" transform="rotate(45, 410, 100)"/>
  <ellipse cx="460" cy="130" rx="4" ry="6" fill="white" fill-opacity="0.6" transform="rotate(20, 460, 130)"/>
  <ellipse cx="380" cy="90" rx="5" ry="7" fill="rgba(200,235,255,0.7)" transform="rotate(50, 380, 90)"/>

  <!-- Sparkle / fun stars -->
  <g fill="#FFD60A">
    <polygon points="90,90 95,78 100,90 112,85 100,92 105,105 95,95 85,105 88,92 78,85" transform="scale(1.2) translate(-10,-10)"/>
    <polygon points="420,380 424,370 428,380 436,376 428,382 432,392 424,384 416,392 419,382 412,376" transform="scale(1.1)"/>
  </g>
  <g fill="white" fill-opacity="0.9">
    <polygon points="100,400 103,392 106,400 112,397 106,402 109,410 103,404 97,410 99,402 94,397"/>
  </g>
</svg>

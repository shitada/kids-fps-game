<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="スプラッシュキッズバトル" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="./favicon-192x192.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-180x180.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="./apple-touch-icon-167x167.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="./apple-touch-icon-152x152.png" />
  <title>スプラッシュキッズバトル — Splash Kids Battle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #87ceeb;
      font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', 'Yu Gothic', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
      touch-action: none;
      color: #1a2540;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      height: 100dvh;
      touch-action: none;
    }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      pointer-events: none;
      z-index: 10;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      pointer-events: none;
      z-index: 20;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }
    #ui-overlay > * {
      pointer-events: auto;
    }
    .crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 14px;
      height: 14px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
    }
    #phone-orientation-hint {
      position: fixed;
      left: calc(50% + env(safe-area-inset-left, 0px) / 2 - env(safe-area-inset-right, 0px) / 2);
      bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      z-index: 60;
      display: none;
      pointer-events: none;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(13, 71, 161, 0.88);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 3px 12px rgba(0,0,0,0.25);
    }
    @media (pointer: coarse) and (max-width: 600px) and (orientation: portrait) {
      #phone-orientation-hint {
        display: block;
      }
    }
    @media (max-width: 740px), (max-height: 430px) {
      .skb-hp {
        left: calc(10px + env(safe-area-inset-left, 0px)) !important;
        bottom: calc(86px + env(safe-area-inset-bottom, 0px)) !important;
        width: 172px !important;
      }
      .skb-hp-label {
        font-size: 13px !important;
        margin-bottom: 3px !important;
      }
      .skb-hp-text {
        font-size: 11px !important;
      }
      .skb-weapon {
        right: calc(10px + env(safe-area-inset-right, 0px)) !important;
        bottom: calc(86px + env(safe-area-inset-bottom, 0px)) !important;
      }
      .skb-weapon-name {
        font-size: 13px !important;
      }
      .skb-ammo {
        font-size: 20px !important;
      }
      .skb-materials {
        left: calc(10px + env(safe-area-inset-left, 0px)) !important;
        top: calc(8px + env(safe-area-inset-top, 0px)) !important;
        font-size: 13px !important;
      }
      .skb-remaining {
        top: calc(8px + env(safe-area-inset-top, 0px)) !important;
        font-size: 13px !important;
        padding: 4px 9px !important;
      }
      .skb-mode {
        right: calc(10px + env(safe-area-inset-right, 0px)) !important;
        top: calc(8px + env(safe-area-inset-top, 0px)) !important;
        font-size: 13px !important;
        padding: 4px 9px !important;
      }
      .skb-zone {
        top: calc(38px + env(safe-area-inset-top, 0px)) !important;
        font-size: 12px !important;
        padding: 4px 8px !important;
        white-space: nowrap;
      }
      .skb-message {
        font-size: clamp(20px, 7vw, 30px) !important;
        padding: 10px 14px !important;
        max-width: min(84vw, 420px);
        text-align: center;
      }
      .crosshair {
        width: 12px;
        height: 12px;
      }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="hud"></div>
  <div id="ui-overlay"></div>
  <div id="phone-orientation-hint">📱 よこむきで あそぶと みやすいよ</div>
  <script>document.addEventListener('contextmenu', function(e) { e.preventDefault(); });</script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
